services:
  postgres:
    image: postgres:16-alpine
    container_name: dwds-postgres
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: dwds
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - dwds-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dwds"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dwds-postgres-data:
